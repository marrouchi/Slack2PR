services:
  api:
    environment:
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cache-network
      - app-network

  redis:
    image: redis/redis-stack-server:7.2.0-v6
    restart: unless-stopped
    networks:
      - cache-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data

volumes:
  redis-data:

networks:
  cache-network:
