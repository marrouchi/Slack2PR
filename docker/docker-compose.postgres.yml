services:
  api:
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      SESSION_LIMIT_SUBQUERY: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-network
      - app-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-dev_only}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_only}
      POSTGRES_DB: ${DB_NAME:-hexabot}
    networks:
      db-network:
        aliases:
          - postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "psql -d \"$${POSTGRES_DB}\" -U \"$${POSTGRES_USER}\" -tAc \"SELECT 1\" >/dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

networks:
  db-network:
